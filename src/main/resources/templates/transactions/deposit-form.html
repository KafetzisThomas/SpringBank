<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">

    <title>Deposit Form</title>
</head>
<body>
    <div th:replace="~{base :: navbar}"></div>

    <div class="container mt-5">
        <h4>Enter Deposit Details</h4>
        <hr class="border-dark">

        <form th:action="@{/deposit/save}" th:object="${transaction}" method="POST">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="mb-3">
                <label for="amount">Amount</label>
                <input type="number" th:field="*{amount}" class="form-control"
                       id="amount" min="0.01" step="0.01" required />

                <!-- Error message -->
                <div class="text-danger mt-1" th:if="${#fields.hasErrors('amount')}" th:errors="*{amount}"></div>
            </div>

            <button type="submit" class="btn btn-info w-100">Apply</button>

        </form>
    </div>

    <div th:replace="~{base :: footer('fixed-bottom')}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>
</html>
