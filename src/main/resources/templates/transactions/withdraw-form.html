<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">

    <title>Withdraw Form</title>
</head>
<body>
    <div th:replace="~{base :: navbar}"></div>

    <div class="container mt-5">
        <h4>Enter Withdraw Details</h4>
        <hr class="border-dark">

        <form th:action="@{/withdraw/save}" th:object="${transaction}" method="POST">

            <label>
                <input type="text" th:field="*{amount}" class="form-control mb-4" placeholder="Amount">
                <button type="submit" class="btn btn-info w-100">Apply</button>
            </label>

        </form>
    </div>

    <div th:replace="~{base :: footer}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>
</html>
