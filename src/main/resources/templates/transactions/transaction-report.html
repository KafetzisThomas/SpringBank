<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">

    <title>Transaction Report</title>
</head>

<body>
    <div th:replace="~{base :: navbar}"></div>

    <div class="container mt-5">
        <h3 class="mt-5 text-center">Transaction Report</h3>

        <!-- Success Message -->
        <div th:if="${successMessage}" class="alert alert-success text-center" th:text="${successMessage}"></div>

        <!-- Error Message -->
        <div th:if="${errorMessage}" class="alert alert-danger text-center" th:text="${errorMessage}"></div>

        <div class="alert alert-secondary text-center mt-3">
            Current Balance:
            <strong th:text="'€ ' + ${currentBalance}"></strong>
        </div>

        <hr class="border-dark">

        <!-- Date range picker -->
        <form class="mb-3" method="GET">
            <div class="input-group input-group-lg">
                <input type="text" name="daterange" class="form-control" placeholder="YYYY-MM-DD - YYYY-MM-DD"
                       th:value="${daterange}">
                <span class="input-group-text">
                    <i class="bi bi-search"></i>
                </span>
            </div>
        </form>

        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr class="text-center">
                    <th>TRANSACTION TYPE</th>
                    <th>DATE</th>
                    <th>AMOUNT</th>
                    <th>BALANCE AFTER TRANSACTION</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="transaction : ${transactions}">
                    <td class="text-center" th:text="${transaction.type}" />
                    <td class="text-center" th:text="${#temporals.format(transaction.timestamp, 'MMM. d, yyyy, h:mm a')}" />
                    <td class="text-center" th:text="'€ ' + ${transaction.amount}" />
                    <td class="text-center" th:text="'€ ' + ${transaction.balance}" />
                </tr>
            </tbody>
        </table>
    </div>

    <div th:replace="~{base :: footer('')}"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous">
    </script>

</body>

</html>
