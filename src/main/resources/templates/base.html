<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${title}">SpringBank</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" th:href="@{/main.css}">
</head>
<body>
    <!-- navbar start -->
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">SpringBank</a>

                <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link"
                               th:classappend="${request?.requestURI == request?.contextPath + '/'} ? ' active' : ''"
                               th:href="@{/}">Transaction Report</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               th:classappend="${request?.requestURI == request?.contextPath + '/deposit'} ? ' active' : ''"
                               th:href="@{/deposit}">Deposit</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link"
                               th:classappend="${request?.requestURI == request?.contextPath + '/withdraw'} ? ' active' : ''"
                               th:href="@{/withdraw}">Withdraw</a>
                        </li>

                    </ul>
                    <ul class="navbar-nav ms-auto mb-lg-0">

                        <li class="nav-item">
                            <form th:action="@{/logout}" method="POST" class="d-inline">
                                <button type="submit" class="nav-link btn btn-link">Logout</button>
                            </form>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <!-- navbar end -->

    <!-- footer start -->
    <footer th:fragment="footer" class="footer text-dark py-3 text-center fixed-bottom">
        <hr class="border-dark mb-1">
        <p class="mb-0">&copy; 2026 KafetzisThomas</p>
    </footer>
    <!-- footer end -->

    <th:block th:fragment="scripts">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </th:block>
</body>
</html>
