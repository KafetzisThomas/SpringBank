<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
    <!-- navbar start -->
    <div th:fragment="navbar">
        <nav class="navbar navbar-expand-lg bg-dark border-bottom border-body" data-bs-theme="dark">
            <div class="container">
                <a class="navbar-brand" th:href="@{/}">Banking System</a>

                <button class="navbar-toggler navbar-dark" type="button" data-bs-toggle="collapse"
                        data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                        aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-lg-0">

                        <li class="nav-item">
                            <a class="nav-link [[${#httpServletRequest.requestURI == '/'} ? 'active' : '']]"
                               th:href="@{/}">Transaction Report</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link [[${#httpServletRequest.requestURI == '/addTransaction'} ? 'active' : '']]"
                               th:href="@{/deposit}">Deposit</a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link [[${#httpServletRequest.requestURI == '/withdraw'} ? 'active' : '']]"
                               th:href="@{/withdraw}">Withdraw</a>
                        </li>

                    </ul>
                    <ul class="navbar-nav ms-auto mb-lg-0">

                        <li class="nav-item">
                            <form th:action="@{/logout}" method="POST" class="d-inline">
                                <button type="submit" class="nav-link btn btn-link">Logout</button>
                            </form>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <!-- navbar end -->

    <!-- footer start -->
    <div th:fragment="footer">
        <footer class="footer text-dark py-3 ">
            <div class="container">
                <hr class="border-dark mb-1">
                <div class="row text-center mt-3">
                    <p>&copy; 2025 KafetzisThomas</p>
                </div>
            </div>
        </footer>
    </div>
    <!-- footer end -->

</body>
</html>
