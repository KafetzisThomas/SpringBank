<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <title>Deposit</title>
</head>
<body>
    <div class="container mt-5">
        <h3>Deposit</h3>
        <hr class="border-dark">

        <p class="h4 mb-4">Enter Deposit Details</p>

        <form th:action="@{/save}" th:object="${transaction}" method="POST">

            <!-- Add a hidden form field to handle update -->
            <input type="hidden" th:field="*{id}" />

            <label>
                <input type="text" th:field="*{amount}" class="form-control mb-4" placeholder="Amount">
                <input type="text" th:field="*{type}" class="form-control mb-4" placeholder="Transaction Type">
                <button type="submit" class="btn btn-info w-100">Save</button>
            </label>

        </form>
    </div>
</body>
</html>
